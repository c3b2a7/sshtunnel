name: Build and release
on:
  release:
    types: [ published ]

jobs:
  generate-changelog:
    runs-on: ubuntu-latest
    outputs:
      content: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          args: --latest --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-binaries:
    runs-on: ubuntu-latest
    needs: generate-changelog
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true
      - name: Validate commits and tag signatures
        run: |
          # Import key
          curl 'https://github.com/c3b2a7.gpg' | gpg --import
          echo "Verifying the tag: ${{ github.event.release.tag_name }}"
          # Only accepted if signed by c3b2a7's key
          git verify-tag "${{ github.event.release.tag_name }}" || exit 1
      - run: go mod download
      - run: make -j releases
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: |
            bin/*.tar.gz
            bin/*.zip
      - name: Publish to GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.event.release.tag_name }}
          prerelease: ${{ github.event.release.prerelease }}
          body: ${{ needs.generate-changelog.outputs.content }}
          files: |
            bin/*.tar.gz
            bin/*.zip

  release-install-script:
    needs: publish-binaries
    uses: c3b2a7/.github/.github/workflows/release-install-script.yaml@main
    with:
      tag: ${{ github.event.release.tag_name }}
      latest: ${{ github.event.release.prerelease == false }}
    secrets:
      R2_INSTALL_ACCESS_KEY_ID: ${{ secrets.R2_INSTALL_ACCESS_KEY_ID }}
      R2_INSTALL_SECRET_ACCESS_KEY: ${{ secrets.R2_INSTALL_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
